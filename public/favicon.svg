<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="3" fill="#1a1410"/>

  <!-- D20 hexagonal body -->
  <polygon
    points="16,2 27,8.5 27,21.5 16,28 5,21.5 5,8.5"
    fill="#8b1e1e" fill-opacity="0.45"
    stroke="#c9a14a" stroke-width="1.6" stroke-linejoin="round"
  />

  <!-- Central triangle (the front "20" face) -->
  <polygon
    points="16,8.5 23.5,22 8.5,22"
    fill="#c9a14a" fill-opacity="0.12"
    stroke="#c9a14a" stroke-width="1" stroke-linejoin="round"
  />

  <!-- Facet lines connecting outer hex to inner triangle -->
  <!-- top vertex down to inner top -->
  <line x1="16" y1="2"   x2="16"   y2="8.5" stroke="#c9a14a" stroke-width="0.9" opacity="0.75"/>
  <!-- upper-right to inner top -->
  <line x1="27" y1="8.5" x2="16"   y2="8.5" stroke="#c9a14a" stroke-width="0.9" opacity="0.75"/>
  <!-- upper-left to inner top -->
  <line x1="5"  y1="8.5" x2="16"   y2="8.5" stroke="#c9a14a" stroke-width="0.9" opacity="0.75"/>
  <!-- lower-right to inner lower-right -->
  <line x1="27" y1="21.5" x2="23.5" y2="22"  stroke="#c9a14a" stroke-width="0.9" opacity="0.75"/>
  <!-- lower-left to inner lower-left -->
  <line x1="5"  y1="21.5" x2="8.5"  y2="22"  stroke="#c9a14a" stroke-width="0.9" opacity="0.75"/>
  <!-- bottom vertex up to both inner bottom vertices -->
  <line x1="16" y1="28"   x2="23.5" y2="22"  stroke="#c9a14a" stroke-width="0.9" opacity="0.75"/>
  <line x1="16" y1="28"   x2="8.5"  y2="22"  stroke="#c9a14a" stroke-width="0.9" opacity="0.75"/>
</svg>
