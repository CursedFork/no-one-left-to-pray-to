<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#5a6a7a"/>
      <stop offset="100%" stop-color="#1a2530"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a5a6a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4a5a6a" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#0d1318"/>
  <circle cx="100" cy="100" r="96" fill="url(#bg)"/>

  <!-- Atmospheric glow -->
  <circle cx="100" cy="70" r="70" fill="url(#glow)"/>

  <!-- Silhouette body (warrior, broader shoulders) -->
  <g clip-path="url(#circle)">
    <!-- Torso shadow mass -->
    <ellipse cx="100" cy="175" rx="52" ry="30" fill="#0d1318" opacity="0.8"/>
    <!-- Body/armor shape -->
    <path d="M58 200 Q60 145 70 130 Q85 118 100 116 Q115 118 130 130 Q140 145 142 200Z" fill="#2a3540"/>
    <!-- Shoulder armor hints -->
    <path d="M68 135 Q60 125 55 115 Q65 108 75 118Z" fill="#3a4a58"/>
    <path d="M132 135 Q140 125 145 115 Q135 108 125 118Z" fill="#3a4a58"/>
    <!-- Neck -->
    <rect x="91" y="106" width="18" height="16" rx="3" fill="#5a7080"/>
    <!-- Head -->
    <ellipse cx="100" cy="90" rx="30" ry="34" fill="#6a8090"/>
    <!-- Facial planes (half-orc) -->
    <ellipse cx="100" cy="88" rx="25" ry="26" fill="#7a9098"/>
    <!-- Prominent brow ridge -->
    <path d="M75 78 Q100 72 125 78" stroke="#4a5a68" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Eyes -->
    <ellipse cx="89" cy="86" rx="5" ry="4" fill="#1a2530"/>
    <ellipse cx="111" cy="86" rx="5" ry="4" fill="#1a2530"/>
    <circle cx="89" cy="85" r="2" fill="#8ab0c0"/>
    <circle cx="111" cy="85" r="2" fill="#8ab0c0"/>
    <!-- Eye glint -->
    <circle cx="90" cy="84" r="0.8" fill="white" opacity="0.6"/>
    <circle cx="112" cy="84" r="0.8" fill="white" opacity="0.6"/>
    <!-- Nose (orcish, broader) -->
    <path d="M96 92 Q100 98 104 92" stroke="#4a5a68" stroke-width="1.5" fill="none"/>
    <!-- Tusks (subtle) -->
    <path d="M93 100 Q91 105 92 108" stroke="#c9b896" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M107 100 Q109 105 108 108" stroke="#c9b896" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Scar across cheek -->
    <path d="M80 82 L92 90" stroke="#3a4a58" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <!-- Hair (dark, pulled back) -->
    <path d="M70 75 Q100 60 130 75 Q118 62 100 58 Q82 62 70 75Z" fill="#1a2530"/>
  </g>

  <!-- Border ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#4a5a6a" stroke-width="2" opacity="0.8"/>
  <circle cx="100" cy="100" r="99" fill="none" stroke="#4a5a6a" stroke-width="0.5" opacity="0.3"/>

  <!-- Corner runes (decorative) -->
  <text x="100" y="193" text-anchor="middle" font-family="serif" font-size="8" fill="#4a5a6a" opacity="0.5">⚡ TALOS ⚡</text>
</svg>
