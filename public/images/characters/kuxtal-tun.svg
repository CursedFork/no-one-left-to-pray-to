<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#6a2020"/>
      <stop offset="100%" stop-color="#1a0808"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b1e1e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b1e1e" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
  </defs>

  <circle cx="100" cy="100" r="100" fill="#110505"/>
  <circle cx="100" cy="100" r="96" fill="url(#bg)"/>
  <circle cx="100" cy="70" r="70" fill="url(#glow)"/>

  <g clip-path="url(#circle)">
    <!-- Body -->
    <ellipse cx="100" cy="175" rx="48" ry="28" fill="#110505" opacity="0.8"/>
    <path d="M62 200 Q64 148 73 133 Q87 120 100 118 Q113 120 127 133 Q136 148 138 200Z" fill="#251010"/>
    <!-- Warlock robes hint -->
    <path d="M73 133 Q68 128 63 118 Q72 112 78 122Z" fill="#301515"/>
    <path d="M127 133 Q132 128 137 118 Q128 112 122 122Z" fill="#301515"/>
    <!-- Elven neck (slender) -->
    <rect x="93" y="108" width="14" height="14" rx="4" fill="#c8a882"/>
    <!-- Head (elven, narrower) -->
    <ellipse cx="100" cy="90" rx="27" ry="33" fill="#d4aa88"/>
    <ellipse cx="100" cy="88" rx="22" ry="26" fill="#ddb898"/>
    <!-- Pointed ears -->
    <path d="M73 82 Q66 78 68 70 Q74 74 76 82Z" fill="#d4aa88"/>
    <path d="M127 82 Q134 78 132 70 Q126 74 124 82Z" fill="#d4aa88"/>
    <!-- Elven eyes (slightly larger, almond) -->
    <ellipse cx="89" cy="85" rx="6" ry="4.5" fill="#1a0808"/>
    <ellipse cx="111" cy="85" rx="6" ry="4.5" fill="#1a0808"/>
    <ellipse cx="89" cy="85" rx="3.5" ry="3" fill="#7a1010"/>
    <ellipse cx="111" cy="85" rx="3.5" ry="3" fill="#7a1010"/>
    <circle cx="90" cy="84" r="0.8" fill="white" opacity="0.5"/>
    <circle cx="112" cy="84" r="0.8" fill="white" opacity="0.5"/>
    <!-- Subtle brow -->
    <path d="M83 79 Q89 76 95 79" stroke="#8a6040" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M105 79 Q111 76 117 79" stroke="#8a6040" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M97 92 Q100 96 103 92" stroke="#9a7050" stroke-width="1.2" fill="none"/>
    <!-- Lips (set expression) -->
    <path d="M93 101 Q100 103 107 101" stroke="#9a6050" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Chain scars on wrists (hint at backstory) -->
    <path d="M64 148 Q66 144 70 146" stroke="#7a2020" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M136 148 Q134 144 130 146" stroke="#7a2020" stroke-width="1.5" fill="none" opacity="0.6"/>
    <!-- Hair (long, dark auburn, slightly loose) -->
    <path d="M73 72 Q100 55 127 72 L130 90 Q120 115 100 118 Q80 115 70 90Z" fill="#3a1010" opacity="0.9"/>
    <path d="M73 72 Q68 85 70 100" fill="none" stroke="#3a1010" stroke-width="8" stroke-linecap="round"/>
    <path d="M127 72 Q132 85 130 100" fill="none" stroke="#3a1010" stroke-width="8" stroke-linecap="round"/>
    <!-- Infernal sigil faint on forehead (warlock) -->
    <text x="100" y="76" text-anchor="middle" font-size="8" fill="#7a1010" opacity="0.4" font-family="serif">⛧</text>
  </g>

  <circle cx="100" cy="100" r="96" fill="none" stroke="#7a2020" stroke-width="2" opacity="0.8"/>
  <circle cx="100" cy="100" r="99" fill="none" stroke="#7a2020" stroke-width="0.5" opacity="0.3"/>
  <text x="100" y="193" text-anchor="middle" font-family="serif" font-size="8" fill="#7a2020" opacity="0.5">AH PUCH</text>
</svg>
